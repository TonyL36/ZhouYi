server {
    listen 80;
    server_name localhost;

    # Frontend Static Files
    # Access: http://localhost/book/ZhouYi
    location /book/ZhouYi {
        alias /usr/share/nginx/html/book/ZhouYi;
        try_files $uri $uri/ /book/ZhouYi/index.html;
    }

    # Redirect root to the app
    location = / {
        return 301 /book/ZhouYi;
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://backend:6401/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Images Proxy (served by backend)
    location /images {
        proxy_pass http://backend:6401/images;
    }
}